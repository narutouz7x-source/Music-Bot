services:
  - type: web
    name: music-bot
    runtime: node
    region: oregon
    plan: free
    buildCommand: npx pnpm@10 install --frozen-lockfile && npx pnpm@10 --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_TOKEN
        sync: false
